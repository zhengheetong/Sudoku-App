<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Sudoku Solver</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><rect x='20' y='20' width='25' height='25' fill='%233b82f6'/><rect x='55' y='20' width='25' height='25' fill='%2314b8a6'/><rect x='20' y='55' width='25' height='25' fill='%2314b8a6'/><rect x='55' y='55' width='25' height='25' fill='%233b82f6'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="glitch-wrapper title-container">
        <h1 class="glitch" data-text=">_ SUDOKU_SOLVER">>_ SUDOKU_SOLVER</h1>
    </div>

    <div class="main-layout">
        <div id="sudoku-board"></div>
        
        <div id="side-panel-wrapper" style="display: none; width: 350px;">
            <div class="side-tabs">
                <button id="tabBtnReference" class="side-tab-btn active">Scan Reference</button>
                <button id="tabBtnReplay" class="side-tab-btn">Terminal Replay</button>
            </div>

            <div class="side-panel-content">
                <div id="reference-panel" style="display: block; text-align: center;">
                    <img id="reference-image" src="" alt="Reference Image" style="max-width: 100%; border: 2px solid var(--primary); border-radius: 4px;">
                </div>

                <div id="terminal-panel" style="display: none; text-align: left; padding: 15px;">
                    
                    <div class="crt-monitor">
                        <div class="screen-glare"></div>
                        <div id="step-message" class="step-message">&gt;_ SYSTEM READY</div>
                    </div>
                    
                    <div class="step-controls">
                        <button id="btnPrevStep" disabled>&lt; Prev</button>
                        <button id="btnPlayPause" disabled>Auto-Play</button>
                        <button id="btnNextStep" disabled>Next &gt;</button>
                    </div>

                    <div class="slider-container" style="margin-top: 15px;">
                        <input type="range" id="stepSlider" min="0" max="0" value="0" disabled>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <input type="file" id="imageUpload" accept="image/*" style="display: none;">

    <div class="controls">
        <button id="btnReset">Reset</button>
        <button id="btnLock">Lock</button>
        <button id="btnSolve">Solve (Visualize)</button>
        <button id="btnFastSolve">Fast Solve</button>
        <label for="imageUpload" class="upload-btn" id="uploadLabel">
            Scan Image (Auto-Fill)
        </label>
    </div>

    <div id="cropOverlay" class="crop-overlay">
        <div class="crop-container">
            <h3 style="color: var(--accent); margin-top: 0; font-family: monospace; letter-spacing: 2px;">ALIGN GRID MARKERS</h3>
            <div class="crop-image-wrapper">
                <img id="cropImage" src="" alt="Upload to crop">
            </div>
            <div class="crop-controls">
                <button id="btnCancelCrop" class="cancel-btn">Abort</button>
                <button id="btnConfirmCrop">Initiate Scan</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p id="loadingText">INITIALIZING NEURAL NET...</p>
    </div>

    <script src="matrix.js"></script>
    <script src="script.js"></script>
</body>
</html>
